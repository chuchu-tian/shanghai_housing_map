<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>风格参考 · 清新果汁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{overflow:hidden;font-family:"Baloo 2","Noto Sans SC",sans-serif}
  .screen{position:fixed;inset:0;display:grid;grid-template-columns:1fr 380px}
  .map{position:relative;overflow:hidden;background:linear-gradient(150deg,#fbfefc,#f2fbf6)}
  .ring-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .ring{fill:none;stroke-dasharray:6 6}
  /* 三环珊瑚红：内深→外浅 */
  .r-in{stroke:#e8590c;stroke-width:3}
  .r-mid{stroke:#ff922b;stroke-width:2.5;opacity:.8}
  .r-out{stroke:#ffd8a8;stroke-width:2;opacity:.9}
  .district{font-size:16px;fill:#a9d9c3;font-weight:700}
  .blob{position:absolute;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;
    background:#fff;border:2.5px solid #b2ecd0;border-radius:18px;box-shadow:0 6px 0 #cbeedd}
  .blob .bl{font-weight:700;color:#0f9d6f;font-size:14px}
  /* 悬停柠檬黄，板块弹起 */
  .blob:hover{background:#ffd43b;border-color:#ffd43b;transform:translateY(-4px) scale(1.05);box-shadow:0 10px 0 #fab005}
  .blob:hover .bl{color:#664d03}
  .styletag{position:absolute;top:20px;left:24px;font-size:12px;font-weight:800;padding:8px 16px;border-radius:999px;background:#12b886;color:#fff}
  .filterbar{position:absolute;bottom:24px;left:24px;display:flex;gap:8px}
  .filterbar button{border:none;font-size:12px;padding:9px 16px;border-radius:999px;cursor:pointer;font-weight:700;background:#fff;color:#0f9d6f;box-shadow:0 3px 0 #cbeedd}
  .filterbar button.on{background:#12b886;color:#fff;box-shadow:0 3px 0 #0c8f6b}
  .panel{padding:32px 26px;overflow-y:auto;background:#fff;color:#20323a}
  .p-block{display:flex;align-items:baseline;gap:8px}
  .p-name{font-size:28px;font-weight:800;color:#0f9d6f}.p-star{font-size:22px;color:#ff922b}
  .p-sub{font-size:12px;margin-top:6px;font-weight:600;color:#7cc9a5}
  .price-row{display:flex;gap:13px;margin-top:20px}
  .price-box{flex:1;border-radius:16px;padding:15px;background:#eefaf3}
  .price-box.new{background:#fff3e8}
  .price-box .lbl{font-size:10px;font-weight:700;color:#6abf99}.price-box.new .lbl{color:#f0851f}
  .price-box .val{font-size:24px;font-weight:800;margin-top:5px;color:#0f9d6f}.price-box.new .val{color:#e8590c}
  .clist{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:22px}
  .clist li{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:12px 14px;border-radius:14px;gap:10px;font-weight:600;background:#f4fbf7}
  .clist li .rt{white-space:nowrap;font-size:12px;font-weight:600;opacity:.85}
  .badge{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:800}
  .badge.resale{background:#12b886;color:#fff}.badge.new{background:#ff922b;color:#fff}
  .desc{margin-top:22px;font-size:12px;line-height:1.7;padding-top:16px;font-weight:600;border-top:2px dashed #dcf0e6;color:#7cc9a5}
</style>
</head>
<body>
  <div class="screen">
    <div class="map">
      <div class="styletag">清新果汁 · 最终风格</div>
      <svg class="ring-svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid meet">
        <ellipse class="ring r-out" cx="440" cy="350" rx="360" ry="280"/>
        <ellipse class="ring r-mid" cx="440" cy="350" rx="225" ry="175"/>
        <ellipse class="ring r-in" cx="440" cy="350" rx="110" ry="86"/>
        <text class="district" x="440" y="108" text-anchor="middle">浦东</text>
        <text class="district" x="180" y="360" text-anchor="middle">徐汇</text>
        <text class="district" x="680" y="380" text-anchor="middle">静安</text>
      </svg>
      <div class="blob" style="left:46%;top:36%;width:150px;height:92px"><span class="bl">苏河湾</span></div>
      <div class="blob" style="left:27%;top:46%;width:135px;height:84px"><span class="bl">古北</span></div>
      <div class="blob" style="left:60%;top:50%;width:140px;height:88px"><span class="bl">中山公园</span></div>
      <div class="blob" style="left:42%;top:62%;width:130px;height:80px"><span class="bl">长征</span></div>
      <div class="filterbar"><button class="on">全部</button><button>只看新房</button><button>只看二手</button></div>
    </div>
    <div class="panel">
      <div class="p-block"><span class="p-name">古北</span><span class="p-star">★</span></div>
      <div class="p-sub">长宁 · 中环 · 涉外成熟社区</div>
      <div class="price-row">
        <div class="price-box resale"><div class="lbl">二手成交均价</div><div class="val">8.5万</div></div>
        <div class="price-box new"><div class="lbl">新房均价</div><div class="val">—</div></div>
      </div>
      <ul class="clist">
        <li><span>★ 古北中央花园 <span class="badge resale">二手</span></span><span class="rt">9.1万·22年</span></li>
        <li><span>黄金城道 <span class="badge resale">二手</span></span><span class="rt">8.8万·20年</span></li>
        <li><span>古北华庭 <span class="badge resale">二手</span></span><span class="rt">8.0万·18年</span></li>
      </ul>
      <div class="desc">最终风格「清新果汁」：淡绿底 + 白色圆润板块卡片（圆角+立体小阴影）+ 三环珊瑚红（内深→外浅）+ 悬停柠檬黄（板块弹起）+ 二手绿/新房橙标签，字体 Baloo 2。鼠标移到板块上看悬停。</div>
    </div>
  </div>
</body>
</html>
