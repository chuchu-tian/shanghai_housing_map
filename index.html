<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>上海买房地图</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#12b886">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="map-wrap">
      <div id="map"></div>
      <div id="filterbar">
        <button data-filter="all" class="on">全部</button>
        <button data-filter="new">只看新房</button>
        <button data-filter="resale">只看二手</button>
      </div>
    </div>
    <aside id="panel" class="empty">
      <header id="topbar">
        <select id="profileSelect"></select>
        <button id="renameBtn" title="给当前身份改名">✎</button>
        <button id="publishBtn" title="批量选择要发布到云端的板块">☁ 发布</button>
        <label id="favOnly"><input type="checkbox"> 只看收藏</label>
      </header>
      <div id="panel-body">
        <div class="panel-placeholder">点击地图上的板块查看详情</div>
      </div>
    </aside>
  </div>
  <div id="publishModal" class="modal-hidden">
    <div class="modal-card">
      <div class="modal-head">
        <span>发布到云端的板块</span>
        <button id="publishClose">✕</button>
      </div>
      <div class="modal-hint">勾选要公开给家人的板块（第二阶段上云后生效）。</div>
      <div class="modal-actions">
        <button id="pubSelectAll">全选</button>
        <button id="pubClearAll">全不选</button>
        <button id="pubFromFav">勾选所有收藏</button>
      </div>
      <ul id="publishList"></ul>
      <button id="pubShareLink" class="edit-add">📋 复制「家人查看」链接</button>
    </div>
  </div>
  <div id="editModal" class="modal-hidden">
    <div class="modal-card modal-wide">
      <div class="modal-head">
        <span id="editTitle">编辑板块</span>
        <button id="editClose">✕</button>
      </div>
      <div class="edit-grid">
        <label>二手成交均价<input id="f_resale" type="number" placeholder="元/㎡"></label>
        <label>新房均价<input id="f_new" type="number" placeholder="元/㎡"></label>
      </div>
      <label class="edit-full">优点（逗号分隔）<input id="f_pros" placeholder="如：学区好，商业成熟"></label>
      <label class="edit-full">缺点（逗号分隔）<input id="f_cons" placeholder="如：房龄老，单价高"></label>
      <div class="edit-sub">小区列表</div>
      <ul id="editCommList"></ul>
      <button id="editAddComm" class="edit-add">＋ 添加小区</button>
      <div class="edit-footer"><button id="editSave" class="edit-save">保存</button></div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load", ()=> navigator.serviceWorker.register("sw.js").catch(()=>{}));
    }
  </script>
</body>
</html>
